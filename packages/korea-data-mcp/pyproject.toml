[project]
name = "korea-data-mcp"
version = "0.1.0"
description = "MCP server for Korea Data Suite — Korean public holidays, business-day math, and MOLIT real-estate transactions as MCP tools."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "choiyounggi" }]
keywords = ["mcp", "korea", "real-estate", "molit", "holidays", "public-data", "api"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "mcp>=1.2",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://api.korea-data.cloud"
Repository = "https://github.com/choiyounggi/korea-data-suite"

[project.scripts]
korea-data-mcp = "korea_data_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/korea_data_mcp"]

[dependency-groups]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
